# XcodeGen spec for the Amateur Radio Suite Xcode workspace.
#
# Authoring tool only — the generated RadioSuite.xcodeproj / .xcworkspace are committed
# and openable directly in Xcode. Regenerate with:  (cd Xcode && xcodegen generate)
#
# This Xcode build exists for the out-of-process (ExtensionKit) tier, which SwiftPM can't
# produce. The plain `swift build` in the repo root still builds the in-process suite.

name: RadioSuite
options:
  bundleIdPrefix: org.vu3esv
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  # The host links only the contract — no plugin apps. Plugins are installed at runtime
  # and run out-of-process (the embedded DemoSDRExtension is the reference `.appex`).
  RadioPluginKit:
    url: https://github.com/VU3ESV/RadioPluginKit.git
    from: "1.2.0"

targets:
  RadioSuiteHost:
    type: application
    platform: macOS
    sources:
      - path: ../Sources/RadioSuite      # reuse the suite sources verbatim
        excludes:
          - RadioSuiteApp.swift          # Xcode target's @main is Host/HostApp.swift
      - path: Host                       # ExtensionKit hosting + the host @main entry
    info:
      path: Host/Info.plist
      properties:
        CFBundleName: Amateur Radio Suite
        CFBundleDisplayName: Amateur Radio Suite
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.vu3esv.radiosuite
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"          # ad-hoc for local dev
    dependencies:
      - package: RadioPluginKit
        product: RadioPluginKit
      - package: RadioPluginKit
        product: RadioPluginUI
      - target: DemoSDRExtension
        embed: true

  DemoSDRExtension:
    type: extensionkit-extension
    platform: macOS
    sources:
      - path: Extension
    info:
      path: Extension/Info.plist
      properties:
        CFBundleName: Demo SDR
        CFBundleDisplayName: Demo SDR
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: org.vu3esv.radiosuite.plugin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.vu3esv.radiosuite.DemoSDR
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: RadioPluginKit
        product: RadioPluginKit
      - package: RadioPluginKit
        product: RadioPluginUI
