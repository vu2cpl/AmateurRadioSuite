name: CI

# Build + test the container on every PR and on pushes to main. The host links only
# RadioPluginKit (plugins are installed at runtime), so this is a standalone SwiftPM
# build — no sibling repos to check out.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (macOS 14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test
