name: Release

# Publishes a GitHub Release every time a PR is merged into main.
# Version is an automatic patch bump of the latest v-prefixed tag (seeded at v0.1.0).
# Artifacts: a zipped universal .app and a .dmg, built with notarize.sh — Developer
# ID signed, hardened-runtime, Apple-notarized and stapled (Gatekeeper passes with
# no right-click-Open dance). The host links only RadioPluginKit, so the build is
# standalone (no sibling checkout).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   APPLE_CERT_BASE64    base64 of the "Developer ID Application" .p12 export
#   APPLE_CERT_PASSWORD  password used when exporting that .p12
#   APPLE_ID             Apple ID email for the notary account
#   APPLE_APP_PASSWORD   app-specific password (appleid.apple.com) for that Apple ID
#   APPLE_TEAM_ID        CHVNJ85C9F

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Only on an actual merge — closing a PR without merging must not release.
    if: github.event.pull_request.merged == true
    name: Build & publish release (macOS 14)
    runs-on: macos-14
    steps:
      - name: Check out merged main
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Compute next version (patch bump)
        id: ver
        run: |
          set -euo pipefail
          git fetch --tags --force
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            ver=${latest#v}
            IFS=. read -r MA MI PA <<< "$ver"
            next="v${MA}.${MI}.$((PA + 1))"
          fi
          echo "Latest: ${latest:-<none>} -> Next: $next"
          echo "tag=$next"            >> "$GITHUB_OUTPUT"
          echo "version=${next#v}"    >> "$GITHUB_OUTPUT"

      # Import Manoj's Developer ID Application cert into a throwaway keychain so
      # codesign (inside notarize.sh) can sign with it. Requires the repo secrets
      # APPLE_CERT_BASE64 (base64 of the .p12) and APPLE_CERT_PASSWORD.
      - name: Import Developer ID certificate
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          echo "$APPLE_CERT_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      # Build the universal bundle, re-sign with Developer ID + hardened runtime,
      # notarize, staple, and package dist/AmateurRadioSuite-<version>.{zip,dmg}.
      # Credentials come from the APPLE_* secrets (raw-env mode in notarize.sh).
      - name: Build, sign & notarize .app (.zip + .dmg)
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./notarize.sh "${{ steps.ver.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "Amateur Radio Suite ${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            --target "${{ github.event.pull_request.base.ref }}" \
            "dist/AmateurRadioSuite-${{ steps.ver.outputs.version }}.zip" \
            "dist/AmateurRadioSuite-${{ steps.ver.outputs.version }}.dmg"
